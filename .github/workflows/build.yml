# cc-switch AUR 包构建、校验与发布 workflow
# 推送 v* tag 时在 archlinux:latest 容器内运行 makepkg 构建并校验 .pkg.tar.zst，
# 校验通过后创建名为 "cc-switch <pkgver>-<pkgrel>" 的 GitHub Release 并上传包文件
name: Build Arch Package

on:
  push:
    tags:
      - 'v*'

# 默认只读权限；release job 单独提升 contents:write
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create non-root build user
        run: |
          # makepkg 不允许以 root 运行，创建非特权 builder 用户并赋予免密 sudo
          useradd -m -G wheel -s /bin/bash builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          # 将工作区交给 builder，保证 srcdir/pkgdir 属主正确
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Install build dependencies
        run: |
          # 更新系统
          pacman -Syu --noconfirm
          # 一次性装齐 PKGBUILD 的 depends 与 makedepends（官方仓库包）
          # libayatana-appindicator-glib 不在官方仓库，由下一步从 AUR 构建安装
          # base-devel 提供编译工具链（gcc/make/patch/pkg-config 等）
          pacman -S --noconfirm --needed \
            base-devel \
            cairo gdk-pixbuf2 glib2 gtk3 hicolor-icon-theme \
            libsoup3 openssl pango webkit2gtk-4.1 \
            nodejs pnpm rust xdg-utils \
            cargo-tauri \
            curl git sudo

      - name: Build libayatana-appindicator-glib from AUR
        run: |
          # libayatana-appindicator-glib 仅在 AUR/archlinuxcn，不在官方仓库
          # 其全部构建依赖（cmake-extras, gi-docgen, gobject-introspection, vala, glib2-devel）已在官方 core/extra
          # 从 AUR 下载快照，以 builder 用户构建并安装，不引入 AUR helper
          pacman -S --noconfirm --needed cmake-extras gi-docgen gobject-introspection vala glib2-devel
          sudo -u builder bash -c '
            cd /tmp &&
            curl -sLO "https://aur.archlinux.org/cgit/aur.git/snapshot/libayatana-appindicator-glib.tar.gz" &&
            tar xzf libayatana-appindicator-glib.tar.gz &&
            cd libayatana-appindicator-glib &&
            makepkg -si --noconfirm
          '

      - name: Build package with makepkg
        run: |
          sudo -u builder makepkg --force

      - name: Verify package structure
        run: |
          # pacman -Qp 解析包元信息与文件列表，退出码 0 即校验通过
          pacman -Qp *.pkg.tar.zst

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: '*.pkg.tar.zst'
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: arch-package
          path: artifact

      - name: Parse pkgver/pkgrel from PKGBUILD
        id: parse
        # PKGBUILD 是 bash 脚本，source 后即可读取顶层变量；函数仅被定义不会执行
        run: |
          source PKGBUILD
          echo "pkgver=${pkgver}" >> "$GITHUB_OUTPUT"
          echo "pkgrel=${pkgrel}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload package
        uses: softprops/action-gh-release@v2
        with:
          # Release 名称形如 "cc-switch 3.17.0-1"
          name: cc-switch ${{ steps.parse.outputs.pkgver }}-${{ steps.parse.outputs.pkgrel }}
          tag_name: ${{ github.ref_name }}
          files: artifact/*.pkg.tar.zst
          fail_on_unmatched_files: true
